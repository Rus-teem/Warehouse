<!--
  Schema.org JSON-LD разметка для Organization (студия дизайна "Юдизайн")
  Добавляет структурированные данные о компании и адресе.
-->
<script type="application/ld+json">
{
    "@context": "http://schema.org/",
    "@type": "Organization",
    "name": "Юдизайн",
    "url": "https://you-design-studio.ru/",
    "address": {
        "@type": "PostalAddress",
        "streetAddress": "Юлиуса Фучика",
        "addressLocality": "Kazan",
        "addressRegion": "Tatarstan",
        "addressCountry": "Russian Federation"
    }
}
</script>
