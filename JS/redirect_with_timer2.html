<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Редирект с таймером</title>
    <style>
        #countdown {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: tildasans;
            font-size: 10em;
        }
    </style>
</head>
<body>
    <!-- Отображение обратного отсчёта -->
    <p id="countdown">3</p>

    <script>
        // Обратный отсчёт с 3 до 0
        let time = 3;
        const timer = setInterval(() => {
            document.getElementById('countdown').textContent = time <= 0
                ? clearInterval(timer)
                : time--;
        }, 1000);
    </script>

    <script>
        // Редирект в зависимости от наличия GET-параметров
        const urlGet = window.location.search;

        function redirectToPageWithGet() {
            location.replace('https://taplink.cc/lad_exhibition');
        }

        function redirectToPageOutlink() {
            setTimeout(function () {
                location.replace('http://you-design-studio.ru/lad-taplink/?utm_source=lad-konkurs&utm_medium=organized&utm_campaign=taplink&utm_content=none&utm_term=none');
            }, 3000);
        }

        if (urlGet !== '') {
            console.log('yes, we have get parameters');
            redirectToPageWithGet();
        } else {
            console.log("no, We don't have GET parameters.");
            redirectToPageOutlink();
        }
    </script>
</body>
</html>
