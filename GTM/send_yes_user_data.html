<!--
  Управление согласием на обработку данных (Consent Mode) через Google Tag Manager.
  По умолчанию все типы хранения отклонены, после нажатия на кнопку cookie — разрешены.
-->
<script>
    window.dataLayer = window.dataLayer || [];

    function gtag() { dataLayer.push(arguments); }

    // Установка согласия по умолчанию: все типы данных отклонены
    gtag('consent', 'default', {
        'ad_storage': 'denied',
        'ad_user_data': 'denied',
        'ad_personalization': 'denied',
        'analytics_storage': 'denied'
    });

    // Разрешение хранения данных после получения согласия
    function consentGrantedAdStorage() {
        gtag('consent', 'update', {
            'ad_storage': 'granted',
            'ad_user_data': 'granted',
            'ad_personalization': 'granted',
            'analytics_storage': 'granted'
        });
    }

    // Обработчик нажатия на кнопку cookie-уведомления
    const cookieButton = document.querySelector('.t657__btn');
    if (cookieButton) {
        cookieButton.addEventListener('click', () => {
            console.log('Кнопка нажата!');
            consentGrantedAdStorage();
        });
    }
</script>
