<!--
  Примеры отправки целей в Яндекс.Метрику и обработки событий через addEventListener.
-->

<!-- Кнопка с вызовом функции цели -->
<button onclick="myFunction()">Click me</button>

<!-- Отправка цели в старую версию счётчика -->
<script>
    yaCounterXXXXXXX.reachGoal('click_subscribe');
</script>

<!-- Отправка цели в новую версию счётчика -->
<script>
    ym(XXXXXX, 'reachGoal', 'TARGET_NAME');
</script>

<!-- Пример обработки клика через addEventListener -->
<p id="demo">Click me.</p>

<script>
    document.getElementById("demo").addEventListener("click", myFunction);

    function myFunction() {
        document.getElementById("demo").innerHTML = "YOU CLICKED ME!";
    }
</script>
